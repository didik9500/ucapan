<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ucapan buat kamu</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-image: url('https://plus.unsplash.com/premium_photo-1681398815894-74fa581c5538?q=80&w=1064&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    color: white;
    overflow: hidden;
    animation: bgMove 60s linear infinite;/*animation adalah animasi untuk menggerakan background*/
}

/* Efek background bergerak halus */
@keyframes bgMove {
    0% { background-position: center top; }/*center top*/
    50% { background-position: center bottom; }/*center bottom*/
    100% { background-position: center top; }/*center top*/
}

/* Overlay tipis supaya teks terbaca */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.3);
    z-index: 0;
}

/* Container gambar ukuran lebar gambar dalam satuan persen*/
.image-container {
    position: relative;
    max-width: 35%;
    text-align: center;
    z-index: 1;
}

/* Gambar responsive + fade */
#displayImage {
    width: 100%;
    height: auto;
    border-radius: 10px;
    transition: opacity 0.5s ease;
}

/* Caption typing effect */
.caption {
    font-weight: bold;
    font-size: 1.4rem;
    margin: 15px 0;
    min-height: 1.5em;
    white-space: pre-wrap;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}

/* Tombol */
#nextBtn {
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background-color: #25d366;
    color: white;
    transition: transform 0.2s ease;
}

#nextBtn.last {
    animation: bounce 0.6s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* Responsive */
@media (max-width: 600px) {
   /* @keyframes bgMove {
   /* 0% { background-position: 0% 50%; }mulai dari kanan*/
    /*50% { background-position: 100% 50%; }jalan ke kiri secara perlahan*/
    /*100% { background-position: 0% 50%; }balik lagi dari kiri ke kanan }*/
 
     body{
        background-image: url('https://plus.unsplash.com/premium_photo-1670719161237-ce368ffd5614?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDExNXx8fGVufDB8fHx8fA%3D%3D');
        background-position: center; /*agar ditengah*/
        background-size: cover; /*memaksa cover disemua layar*/
        background-repeat: no-repeat; /*agar tidak putus" gambarnya pas dilayar besar*/
     }
    .caption { font-size: 1rem; }
    #nextBtn { font-size: 0.9rem; padding: 8px 16px; }
    .image-container {
    position: relative;
    max-width: 75%;
    text-align: center;
    z-index: 1;
 }
}
</style>
</head>
<body>

<div class="image-container">
    <img id="displayImage" src="" alt="Gambar">
    <div id="imageCaption" class="caption"></div>
    <button id="nextBtn">Next</button>
</div>

<script>
const images = ["https://media.istockphoto.com/id/1188006195/photo/female-hands-in-heart-shape.webp?a=1&b=1&s=612x612&w=0&k=20&c=Bq0HyqDBxIR7BMOaY3xeMHEQZ0rJzOpbP9oy8aBRcfQ=",
        "https://images.unsplash.com/photo-1516349935484-52a0d805fdb1?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjQzfHxsb3ZlfGVufDB8fDB8fHww",
        "https://images.unsplash.com/photo-1500662434123-4d06b56a762f?q=80&w=853&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
        "https://plus.unsplash.com/premium_photo-1700353612860-bd8ab8d71f05?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8cm9tYW50aWN8ZW58MHx8MHx8fDA%3D",
        "https://media.tenor.com/2MsCRIkSSgAAAAAM/peach-goma-goma-peach.gif"
];

const captions = [
    "cinta mungkin hadir karena takdir 💖",
    "namun tidak ada salahnya untuk di perjuangkan..",
    "bersamamu dunia ini terasa indah ✨",
    "jika kamu nyaman denganku",
    "ayo kita rangkai masadepan dalam sebuah perbincangan"
];

let currentIndex = 0;
const displayImage = document.getElementById("displayImage");
const imageCaption = document.getElementById("imageCaption");
const nextBtn = document.getElementById("nextBtn");

const waPhone = "6281234567890";//nomer kita
const waMessage = "telphone aku ya...";//kata" yang akan ada di chat wa dia yg skan dikirim kekamu

// Typing effect
function typeCaption(text) {
    imageCaption.textContent = "";//textContent knpa "tidak ada value karna value"; nya mengambil langsung dari array jika diisi hurup atau anggka bisa saja namun akan menggangu huruf di tampilan web
    let i = 0;
    const interval = setInterval(() => {
        imageCaption.textContent += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 50);//50 adalah kecepatan mengetik
}

// Show image + caption
function showImage(index) {
    displayImage.style.opacity = 0;
    setTimeout(() => {
        displayImage.src = images[index];
        displayImage.style.opacity = 1;
        typeCaption(captions[index]);
    }, 200);//untuk menghetikan set interval

    if (index === images.length - 1) {
        nextBtn.textContent = "Hubungi WA";
        nextBtn.classList.add("last");
    } else {
        nextBtn.textContent = "Next";
        nextBtn.classList.remove("last");
    }
}

// Button click
nextBtn.addEventListener("click", () => {
    if (currentIndex < images.length - 1) {
        currentIndex++;
        showImage(currentIndex);
    } else {
        const url = `https://wa.me/${waPhone}?text=${encodeURIComponent(waMessage)}`;
        window.open(url, "_blank");
    }
});

// First image nama fuction yg akan dimasukan kedalam kondisi tombol ketika di klik
showImage(currentIndex);
</script>

</body>
</html>
